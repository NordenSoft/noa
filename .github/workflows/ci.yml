name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      # The cross-impl conformance proof shells out to the independent Python verifier (impl-py/noa_verify.py),
      # so python3 must be on PATH for that gate to run.
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: npm ci
      - name: Build + generate vectors + test
        run: npm test
      - name: Cross-impl conformance (TS reference == independent Python verifier)
        # Gates the TS↔PY interop bar: a divergence on identical signed bytes FAILS the build (not just the
        # in-language test). Needs the dist build (npm test already built it) + python3 (set up above).
        run: |
          npm run build
          node impl-py/conformance.mjs
      - name: Conformance vectors are reproducible (no drift)
        run: |
          # catches modified AND newly-generated (untracked) vector files
          if [ -n "$(git status --porcelain conformance/)" ]; then
            echo "::error::conformance vectors changed/added — regenerate with 'npm run gen:vectors' and commit"
            git status --porcelain conformance/
            exit 1
          fi
      - name: Conformance matrix is up to date (no drift)
        # Regenerates conformance/MATRIX.md from conformance.mjs's own output and fails if it differs
        # from the committed copy (or if any vector could not be classified into a security class).
        # Same "regenerate + git-diff" discipline as the vector-drift check above, applied to the
        # derived TS↔Python pass/fail matrix so it can never silently go stale against the harness.
        run: node scripts/conformance-matrix.mjs --write && git diff --exit-code conformance/MATRIX.md
      - name: Self-check the CLI exit-code contract
        run: |
          set -e
          node dist/src/cli.js verify conformance/vectors/valid-chain.json \
            --keyring conformance/vectors/keyring.json \
            --checkpoint conformance/vectors/checkpoint.json > /dev/null
          echo "VALID -> exit $? (want 0)"
          if node dist/src/cli.js verify conformance/vectors/attack/tampered-content.json \
            --keyring conformance/vectors/keyring.json > /dev/null; then
            echo "::error::tampered vector verified as VALID"; exit 1
          else
            echo "TAMPERED -> exit $? (want non-zero)"
          fi
      - name: Dogfood pilots (PRIVATE, vitest — proxy/replay/co-attestation behaviour)
        # The dogfood harnesses under test/dogfood/ are PRIVATE/internal (not in package.json `files`)
        # and use vitest (resolved via a pinned npx, NOT a project dependency — the lib stays zero-dep).
        # `npm test` (node:test) deliberately excludes them; this gates their runtime behaviour.
        run: npm run test:dogfood
      - name: adapter-core unit tests (packages/adapter-core)
        # package-lock.json is committed here — adapter-core now depends on the published
        # noa-receipt registry package instead of importing the repo's built dist/ directly, so
        # `npm ci` is correct (and no longer needs the root build step above for this dependency).
        run: |
          cd packages/adapter-core
          npm ci
          npm test
      - name: signer-sidecar smoke test (packages/signer-sidecar)
        # Real 2-process smoke test (sidecar.mjs child process + client.mjs). Must run AFTER
        # adapter-core's own `npm ci` above (same file:../adapter-core node_modules-population
        # reason the mcp-proxy step below already documents) and BEFORE mcp-proxy's own step
        # (mcp-proxy's --signer-socket integration test spawns THIS package's sidecar.mjs
        # directly by relative path, so it must already have its own node_modules populated).
        run: |
          cd packages/signer-sidecar
          npm ci
          npm test
      - name: mcp-proxy smoke test (packages/mcp-proxy)
        # Real-transport smoke test: fail-closed DENY, live tools/list reflection, session
        # isolation, persist-then-commit ordering, and CLI double-stdio integration.
        # Must run AFTER the adapter-core AND signer-sidecar steps above: mcp-proxy links both
        # via file:../adapter-core and file:../signer-sidecar, and Node resolves each one's own
        # dependencies from ITS OWN node_modules — populated only by that package's own `npm ci`
        # (npm does not install a file: dep's dependencies across the link boundary).
        # Do not split these three steps into parallel jobs.
        run: |
          cd packages/mcp-proxy
          npm ci
          npm test
      - name: tsa-anchor unit tests (packages/tsa-anchor)
        # RFC 3161 DER encode/decode, TimeStampReq/Resp, client self-checks, verifyStamp, CLI.
        # UNLIKE adapter-core (which uses the PUBLISHED noa-receipt), tsa-anchor depends on the
        # LOCAL repo via `noa-receipt: file:../..`, so `npm ci` here just symlinks node_modules/
        # noa-receipt -> the repo root, and `import "noa-receipt"` resolves to the root's built
        # dist/ (main: dist/src/index.js). That dist/ already exists because the conformance step
        # above ran `npm run build`. Keep this step AFTER that build — do not move it earlier.
        run: |
          cd packages/tsa-anchor
          npm ci
          npm test
      - name: signer-core parity gates (packages/signer-core)
        # G1 (RFC 8032 vectors) + G2 (golden-receipt byte-parity vs noa-receipt's own
        # buildReceipt/signEd25519) — the P1a kill-gates from .plan/MOBILE-APP-BUILD-SPEC.md §3.
        # Same `noa-receipt: file:../..` local-repo dependency as tsa-anchor above (needs the
        # root `dist/` already built by the earlier step); `noa-receipt` is a devDependency here
        # ONLY (reference implementation for the G2 test) — the shipped src/ never imports it.
        # `npm run mock-shell` is the runtime proof that the compiled core has no platform-SDK
        # dependency (no DOM/Telegram/React-Native), complementing the compile-time `lib`
        # boundary (tsconfig excludes "dom") this package's tsc build already enforces.
        run: |
          cd packages/signer-core
          npm ci
          npm test
          npm run mock-shell
