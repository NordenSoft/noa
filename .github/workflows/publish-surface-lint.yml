name: publish-surface-lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: publish-surface-lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
      # npm ci runs the `prepare` hook (npm run build), which is required: the linter scans the
      # files npm would ACTUALLY ship (via `npm pack --dry-run --json`), including dist/src/*.js.
      - run: npm ci
      - name: Lint the published npm tarball surface (K4 internal-process jargon + K5 security-marketing claims)
        run: npm run lint:publish-surface
