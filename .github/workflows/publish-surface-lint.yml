name: publish-surface-lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: publish-surface-lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
      # npm ci runs the `prepare` hook (npm run build), which is required: the linter scans the
      # files npm would ACTUALLY ship (via `npm pack --dry-run --json`), including dist/src/*.js.
      - run: npm ci
      - name: Lint the published npm tarball surface (K4 internal-process jargon + K5 security-marketing claims)
        run: npm run lint:publish-surface
